name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Increase Swap Space
        # OpenSSL and Kivy compilation can be RAM-intensive
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip libtool autoconf cmake gettext \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 libffi-dev libssl-dev libusb-1.0-0-dev \
            python3-setuptools
          
          pip install --upgrade pip
          pip install --user buildozer "cython<3.0.0" virtualenv
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          rm -rf .buildozer/
          # We use the internal flag to accept licenses instead of 'yes |'
          buildozer -v android debug
