name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          openjdk-17-jdk \
          wget \
          unzip \
          tar \
          git \
          build-essential \
          zip

        # Make Java 17 visible to all next steps
        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

    - name: Install Android SDK (with correct cmdline-tools layout)
      run: |
        sudo mkdir -p /usr/local/lib/android/sdk
        cd /usr/local/lib/android/sdk

        # Download Android command-line tools
        sudo wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        sudo unzip -q cmdline-tools.zip

        # Normalize directory to: cmdline-tools/latest/bin/sdkmanager
        sudo mkdir -p cmdline-tools
        sudo mv cmdline-tools cmdline-tools-old || true
        sudo mkdir -p cmdline-tools/latest
        sudo mv cmdline-tools-old/cmdline-tools/* cmdline-tools/latest/

        # Export SDK paths for subsequent steps
        echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH

        # Accept licenses and install required components
        yes | sdkmanager --licenses

        sdkmanager \
          "platform-tools" \
          "platforms;android-31" \
          "build-tools;31.0.0" \
          "ndk;23.1.7779620"

    - name: Install Python build tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install buildozer cython
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Verify required commands
      run: |
        which java
        which sdkmanager
        which buildozer

    - name: Build APK with Buildozer
      run: |
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: silomanager-apk
        path: bin/*.apk
