name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      PATH: /usr/lib/jvm/java-17-openjdk-amd64/bin:/usr/local/lib/android/sdk/cmdline-tools/latest/bin:/usr/local/lib/android/sdk/platform-tools:/usr/local/lib/android/sdk/build-tools/31.0.0:$PATH

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk wget unzip git build-essential zip

    - name: Install Android Commandline Tools
      run: |
        sudo mkdir -p /usr/local/lib/android/sdk/cmdline-tools
        cd /usr/local/lib/android/sdk/
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        sudo unzip cmdline-tools.zip -d cmdline-tools
        sudo mv cmdline-tools/cmdline-tools cmdline-tools/latest

    - name: Install SDK Components
      run: |
        yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses
        sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools"
        sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-31"
        sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;31.0.0"
        sdkmanager --sdk_root=$ANDROID_SDK_ROOT "ndk;23.1.7779620"

    - name: Install Python build tools
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SiloManager-APK
        path: bin/*.apk
