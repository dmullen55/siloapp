name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip libtool autoconf cmake gettext \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 libffi-dev libssl-dev libusb-1.0-0-dev \
            python3-setuptools
          
          pip install --upgrade pip
          pip install --user buildozer "cython<3.0.0" virtualenv
          # This ensures the buildozer command is available in the next step
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          # Use the pre-installed SDK/NDK paths on the runner
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME
          
          # Clean and Build
          rm -rf .buildozer/
          buildozer -v android debug
        env:
          # This helps Buildozer find the tools in the GitHub runner
          ANDROID_SDK_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SiloManager-APK
          path: bin/*.apk
