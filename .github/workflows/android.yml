name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip libtool autoconf cmake gettext \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 libffi-dev libssl-dev libusb-1.0-0-dev \
            python3-setuptools
          
          # Install Buildozer and Cython
          pip install --upgrade pip
          pip install --user buildozer cython virtualenv
          # Add local bin to path so 'buildozer' command is recognized
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          # 1. Force remove any corrupted platform folders
          rm -rf .buildozer/android/platform
          
          # 2. Re-initialize the clean state
          buildozer android clean
          
          # 3. Run the build
          # Using 'yes |' handles the SDK license prompts automatically
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SiloManager-APK
          path: bin/*.apk
