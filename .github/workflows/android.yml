name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      # Force Buildozer to use THIS SDK (not ~/.buildozer)
      ANDROIDSDK: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROIDNDK: /usr/local/lib/android/sdk/ndk/23.1.7779620

      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up Python 3.10 (REQUIRED for Buildozer)
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          openjdk-17-jdk \
          wget \
          unzip \
          tar \
          git \
          build-essential \
          zip

        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

    - name: Install Android SDK (correct layout + AIDL)
      run: |
        set -eux

        sudo mkdir -p /usr/local/lib/android/sdk
        cd /usr/local/lib/android/sdk

        sudo rm -rf cmdline-tools
        sudo mkdir -p cmdline-tools/latest

        sudo wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
        sudo unzip -q tools.zip -d cmdline-tools/latest
        sudo rm tools.zip

        # Flatten layout so sdkmanager is exactly where Buildozer expects it
        sudo mv cmdline-tools/latest/cmdline-tools/* cmdline-tools/latest/
        sudo rmdir cmdline-tools/latest/cmdline-tools

        SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"

        "$SDKMANAGER" --sdk_root=/usr/local/lib/android/sdk --version
        yes | "$SDKMANAGER" --sdk_root=/usr/local/lib/android/sdk --licenses

        "$SDKMANAGER" --sdk_root=/usr/local/lib/android/sdk \
          "platform-tools" \
          "platforms;android-31" \
          "build-tools;31.0.0" \
          "ndk;25.2.9519653"

        # Legacy compatibility path Buildozer still checks
        sudo mkdir -p /usr/local/lib/android/sdk/tools/bin
        sudo ln -sf \
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
          /usr/local/lib/android/sdk/tools/bin/sdkmanager

        echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH

    - name: Remove Buildozer cached SDK
      run: |
        rm -rf ~/.buildozer/android/platform/android-sdk

    - name: Install Python build tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install buildozer cython
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Verify AIDL exists
      run: |
        ls /usr/local/lib/android/sdk/build-tools/31.0.0/aidl

    - name: Full Buildozer clean
      run: |
        buildozer android clean || true
        rm -rf ~/.buildozer
    

    - name: Force python-for-android to use NDK 25 ONLY
      run: |
        echo "ANDROID_NDK_LATEST_HOME=" >> $GITHUB_ENV
        echo "ANDROID_NDK=" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=" >> $GITHUB_ENV
        echo "ANDROIDNDK=/usr/local/lib/android/sdk/ndk/25.2.9519653" >> $GITHUB_ENV




    - name: Build APK with Buildozer (trace)
      run: |
        set -x
        buildozer android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: silomanager-apk
        path: bin/*.apk
