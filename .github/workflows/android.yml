name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          openjdk-17-jdk \
          wget \
          unzip \
          tar \
          git \
          build-essential \
          zip

        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

    - name: Install Android SDK (sdkmanager FIXED PROPERLY)
      run: |
        sudo mkdir -p $ANDROID_SDK_ROOT
        cd $ANDROID_SDK_ROOT

        sudo rm -rf cmdline-tools
        sudo wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
        sudo unzip -q tools.zip

        # ✅ Find sdkmanager no matter where Google puts it
        SDKMANAGER_PATH=$(find $ANDROID_SDK_ROOT -type f -name sdkmanager -perm -111 | head -n 1)

        if [ -z "$SDKMANAGER_PATH" ]; then
          echo "❌ sdkmanager not found after extraction"
          exit 1
        fi

        SDKMANAGER_DIR=$(dirname "$SDKMANAGER_PATH")
        echo "✅ sdkmanager found at: $SDKMANAGER_PATH"

        # Make it available immediately
        export PATH="$SDKMANAGER_DIR:$PATH"

        # Persist for future steps
        echo "$SDKMANAGER_DIR" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

        sdkmanager --version
        yes | sdkmanager --licenses

        sdkmanager \
          "platform-tools" \
          "platforms;android-31" \
          "build-tools;31.0.0" \
          "ndk;23.1.7779620"

    - name: Install Python build tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install buildozer cython
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Verify required commands
      run: |
        which java
        which sdkmanager
        which buildozer

    - name: Build APK with Buildozer
      run: |
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: silomanager-apk
        path: bin/*.apk
