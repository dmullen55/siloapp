name: Build Silo Manager APK
 
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          git \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          openjdk-17-jdk \
          zip \
          unzip \
          autoconf \
          libtool \
          pkg-config \
          libncurses5-dev \
          libncursesw5-dev \
          cmake

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0" buildozer

    - name: Build APK
      run: |
        # We use 'yes |' to automatically accept Android SDK licenses during build
        yes | buildozer -v android debug
      env:
        # Increase logging to see the exact point of failure if it occurs
        BUILDOZER_LOG_LEVEL: 2

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SiloManager-Debug-APK
        path: bin/*.apk
