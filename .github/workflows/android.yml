name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          openjdk-17-jdk \
          wget \
          unzip \
          tar \
          git \
          build-essential \
          zip

        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

    - name: Install Android SDK (absolute-path, layout-safe)
      run: |
        set -e

        sudo mkdir -p $ANDROID_SDK_ROOT
        cd $ANDROID_SDK_ROOT

        sudo rm -rf cmdline-tools
        sudo mkdir -p cmdline-tools/latest

        sudo wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip

        # unzip INTO latest so layout is guaranteed
        sudo unzip -q tools.zip -d cmdline-tools/latest
        sudo rm tools.zip

        SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

        # sanity check (this is where previous runs failed)
        if [ ! -x "$SDKMANAGER" ]; then
          echo "❌ sdkmanager NOT found at expected location"
          ls -R cmdline-tools
          exit 1
        fi

        echo "✅ sdkmanager located at $SDKMANAGER"

        # Accept licenses and install components (ALWAYS pass --sdk_root)
        yes | "$SDKMANAGER" --sdk_root=$ANDROID_SDK_ROOT --licenses

        "$SDKMANAGER" --sdk_root=$ANDROID_SDK_ROOT \
          "platform-tools" \
          "platforms;android-31" \
          "build-tools;31.0.0" \
          "ndk;23.1.7779620"

        # Persist paths for later steps
        echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

    - name: Install Python build tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install buildozer cython
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Verify tools
      run: |
        which java
        which sdkmanager
        which buildozer

    - name: Build APK with Buildozer
      run: |
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: silomanager-apk
        path: bin/*.apk
