name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          openjdk-17-jdk \
          wget \
          unzip \
          tar \
          git \
          build-essential \
          zip

        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

    - name: Install Android SDK (FINAL FIXED LAYOUT)
      run: |
        sudo mkdir -p $ANDROID_SDK_ROOT
        cd $ANDROID_SDK_ROOT

        # Clean any previous tool installs
        sudo rm -rf cmdline-tools
        sudo mkdir -p cmdline-tools/latest

        # Download Android commandline tools
        sudo wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip

        # Extract into a temp directory
        sudo unzip -q tools.zip -d /tmp/sdk-tools

        # Move EVERYTHING into cmdline-tools/latest (this is what sdkmanager expects)
        sudo mv /tmp/sdk-tools/* cmdline-tools/latest/

        # Cleanup
        sudo rm -rf /tmp/sdk-tools tools.zip

        # Export paths
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
        echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

        # Verify sdkmanager works and knows SDK root
        sdkmanager --sdk_root=$ANDROID_SDK_ROOT --version

        # Accept licenses and install required components
        yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses

        sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
          "platform-tools" \
          "platforms;android-31" \
          "build-tools;31.0.0" \
          "ndk;23.1.7779620"

    - name: Install Python build tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install buildozer cython
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Verify required commands
      run: |
        which java
        which sdkmanager
        which buildozer

    - name: Build APK with Buildozer
      run: |
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: silomanager-apk
        path: bin/*.apk
