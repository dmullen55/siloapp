name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          openjdk-17-jdk \
          wget \
          unzip \
          tar \
          git \
          build-essential \
          zip

        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

    - name: Install Android SDK (sdkmanager FIXED)
      run: |
        sudo mkdir -p $ANDROID_SDK_ROOT
        cd $ANDROID_SDK_ROOT

        sudo rm -rf cmdline-tools
        sudo mkdir -p cmdline-tools/latest

        sudo wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
        sudo unzip -q tools.zip -d /tmp/sdk-tools

        # Move EVERYTHING into latest (layout-agnostic)
        sudo mv /tmp/sdk-tools/* cmdline-tools/latest/
        sudo rm -rf /tmp/sdk-tools tools.zip

        # ✅ CRITICAL FIX: export PATH for THIS step
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"

        # Verify sdkmanager NOW works
        sdkmanager --version

        yes | sdkmanager --licenses

        sdkmanager \
          "platform-tools" \
          "platforms;android-31" \
          "build-tools;31.0.0" \
          "ndk;23.1.7779620"

        # Also persist PATH for later steps
        echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
